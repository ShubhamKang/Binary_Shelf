<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BinaryShelf | Tech Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-terminal animate-glow"></i>
                <h2>Binary<span>Shelf</span></h2>
            </div>
            <nav id="sidebar-nav">
                <div class="nav-item active" data-target="dashboard">
                    <i class="fas fa-columns"></i> Dashboard
                </div>
                <div class="nav-item" data-target="catalog">
                    <i class="fas fa-code-branch"></i> Tech Catalog
                </div>
            </nav>
            <div class="sidebar-footer">
                <i class="fas fa-microchip"></i> v1.0.5-Stable
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search across 1,000+ tech modules...">
                </div>
                <div class="user-status">
                    <div class="avatar">AD</div>
                </div>
            </header>

            <div id="dashboard-view" class="view-content active">
                <section class="action-grid">
                    <div class="glass-form fade-in">
                        <h3><i class="fas fa-plus-circle animate-float"></i> Push New Book</h3>
                        <form id="book-form">
                            <div class="input-row">
                                <input type="text" id="title" placeholder="Title (e.g. React Docs)" required>
                                <input type="text" id="author" placeholder="Author" required>
                            </div>
                            <div class="input-row">
                                <input type="text" id="isbn" placeholder="ISBN Number" required>
                                <select id="status">
                                    <option value="Available">Available</option>
                                    <option value="Booked">Reserved</option>
                                </select>
                            </div>
                            <button type="submit" class="push-btn">Commit Entry</button>
                        </form>
                    </div>
                    <div class="counter-card">
                        <i class="fas fa-database animate-pulse"></i>
                        <div class="stat">
                            <h3 id="total-count"></h3>
                            <p> plus Books Available</p>
                        </div>
                    </div>
                </section>

                <section class="data-section fade-in">
                    <div class="section-header">
                        <h3><i class="fas fa-table-list"></i> Book Registry</h3>
                    </div>
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title & Author</th>
                                    <th>ISBN</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="book-list"></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div id="catalog-view" class="view-content">
                <div class="catalog-header">
                    <h2><i class="fas fa-layer-group animate-float"></i> Module Catalog</h2>
                    <p>Technological frameworks and language documentation.</p>
                </div>
                <div id="catalog-grid" class="catalog-grid">
                    </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
